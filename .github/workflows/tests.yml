name: SEO Dashboard Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php: [8.2, 8.3]
        stability: [prefer-lowest, prefer-stable]
    
    name: PHP ${{ matrix.php }} - ${{ matrix.stability }}
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seo_dashboard_testing
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=3s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer dependencies
        run: composer install --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Directory Permissions
        run: chmod -R 755 storage bootstrap/cache

      - name: Run Database Migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Clear Config
        run: php artisan config:clear

      - name: Run Unit Tests
        run: ./vendor/bin/pest --testsuite=Unit --coverage --min=80
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Feature Tests
        run: ./vendor/bin/pest --testsuite=Feature --parallel
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Integration Tests
        run: ./vendor/bin/pest --testsuite=Integration
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Generate Coverage Report
        run: ./vendor/bin/pest --coverage-html coverage-report --coverage-clover coverage.xml
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true

      - name: Archive coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-php${{ matrix.php }}
          path: coverage-report/

  performance:
    runs-on: ubuntu-latest
    name: Performance Tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seo_dashboard_testing
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, soap, intl, gd, exif, iconv

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run Database Migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Performance Tests
        run: ./vendor/bin/pest --testsuite=Performance --stop-on-failure
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

  security:
    runs-on: ubuntu-latest
    name: Security Tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seo_dashboard_testing
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, soap, intl, gd, exif, iconv

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy .env.testing
        run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run Database Migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Security Tests
        run: ./vendor/bin/pest tests/Feature/Security --stop-on-failure
        env:
          DB_CONNECTION: pgsql_testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: seo_dashboard_testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Laravel Security Check
        run: composer audit